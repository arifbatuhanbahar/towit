name: CI

on:
  pull_request:
  push:
    branches:
      - "**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static_checks:
    name: Static Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Web lint
        run: npm run lint -w apps/web

  unit_tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: static_checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests (server + web)
        run: npm test

  integration_tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit_tests
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: towit
          POSTGRES_PASSWORD: towit
          POSTGRES_DB: towit
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U towit -d towit"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://towit:towit@localhost:5432/towit
      JWT_ACCESS_SECRET: towit-ci-access-secret
      JWT_REFRESH_SECRET: towit-ci-refresh-secret
      PORT: 4000
      NODE_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply DB migrations
        run: npm run db:migrate -w apps/server

      - name: Build server
        run: npm run build -w apps/server

      - name: Start server
        run: npm run start -w apps/server &

      - name: Wait for API
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:4000/health > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "API did not become ready in time"
          exit 1

      - name: API smoke (register + login)
        run: |
          curl -fsS -X POST http://localhost:4000/auth/register \
            -H "Content-Type: application/json" \
            -d '{"email":"ci-customer@towit.tr","password":"demo1234","role":"customer"}' > /tmp/register.json

          curl -fsS -X POST http://localhost:4000/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"ci-customer@towit.tr","password":"demo1234"}' > /tmp/login.json

  system_smoke:
    name: System Smoke (Compose)
    runs-on: ubuntu-latest
    needs: integration_tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start full stack
        run: docker compose up --build -d

      - name: Wait for web and api
        run: |
          for i in {1..60}; do
            api_ok=0
            web_ok=0
            if curl -fsS http://localhost:4000/health > /dev/null; then api_ok=1; fi
            if curl -fsS http://localhost:5173 > /dev/null; then web_ok=1; fi
            if [ "$api_ok" -eq 1 ] && [ "$web_ok" -eq 1 ]; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs --tail=200
          exit 1

      - name: Stop stack
        if: always()
        run: docker compose down -v

  build_artifacts:
    name: Build Artifacts
    runs-on: ubuntu-latest
    needs: system_smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build monorepo
        run: npm run build
