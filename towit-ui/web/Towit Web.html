<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Towit — Web</title>

  <link rel="stylesheet" href="../styles/towit.css" />
  <link rel="stylesheet" href="../styles/towit-web.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
          integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
          integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
          integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
          crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; }
    #root { width: 100%; height: 100%; }
    /* CustomerPage inside web has no sticky header — web shell handles it */
    .web-content .towit { background: transparent; height: auto; }
    .web-content .towit .app-header { display: none; }
    .web-content .towit .scroll-area { overflow: visible; height: auto; flex: none; }
    /* Auth split fills the wrapper */
    .auth-split { height: 100%; min-height: 560px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="../tweaks-panel.jsx"></script>
  <script type="text/babel" src="../components/shared.jsx"></script>
  <script type="text/babel" src="../components/auth.jsx"></script>
  <script type="text/babel" src="../components/customer.jsx"></script>
  <script type="text/babel" src="../components/operator.jsx"></script>
  <script type="text/babel" src="../components/profile.jsx"></script>
  <script type="text/babel" src="../components/history.jsx"></script>
  <script type="text/babel" src="web-app.jsx"></script>
  <script src="../view-switcher.js"></script>
  <script>
    window.TowitViewSwitcher.setPreferredView('desktop');
    window.TowitViewSwitcher.mountSwitchButton('desktop');
  </script>
</body>
</html>
